<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KurageWorks Aquarium Base (A)</title>
  <style>
    html, body { margin:0; height:100%; background:#0b1420; overflow:hidden; }
    #app { position:fixed; inset:0; }

    /* Live cam overlay */
    .hud {
      position:fixed; inset:0; pointer-events:none;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      color: rgba(255,255,255,0.92);
    }
    .hud .topbar {
      position:absolute; left:16px; top:14px;
      display:flex; gap:10px; align-items:center;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 8px 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .pill {
      display:inline-flex; align-items:center; gap:8px;
      font-size: 12px; letter-spacing: 0.06em;
      opacity: 0.95;
    }
    .dot {
      width:8px; height:8px; border-radius:50%;
      background: #ff3b6a;
      box-shadow: 0 0 14px rgba(255,59,106,0.8);
    }
    .hud .corner {
      position:absolute; right:16px; bottom:16px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 10px 12px;
      max-width: 360px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .hud .corner .title { font-size: 12px; opacity: 0.9; margin-bottom: 6px; }
    .hud .corner .desc { font-size: 12px; line-height: 1.45; opacity: 0.75; }

    /* Optional: subtle vignette */
    .vignette {
      position:fixed; inset:0; pointer-events:none;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.0) 35%, rgba(0,0,0,0.35) 100%);
      mix-blend-mode: multiply;
    }

    /* Clickable controls (pointer-events on) */
    .controls {
      position:fixed; left:16px; bottom:16px; pointer-events:auto;
      display:flex; gap:10px; align-items:center;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 10px 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .btn {
      appearance:none; border:none; cursor:pointer;
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      transition: transform 120ms ease, background 120ms ease;
    }
    .btn:hover { background: rgba(255,255,255,0.14); transform: translateY(-1px); }
    .btn:active { transform: translateY(0px) scale(0.99); }

    .hint {
      font-size: 12px;
      opacity: 0.7;
      margin-left: 4px;
      user-select:none;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <div class="topbar">
      <div class="pill"><span class="dot"></span><span>LIVE</span></div>
      <div class="pill" id="clock">--:--:--</div>
    </div>

    <div class="corner">
      <div class="title">KurageWorks Aquarium Cam</div>
      <div class="desc">静かな水槽ベース（Style A）。このままでも“眺められる”状態。あとでglbのキャラ/小物を差し替えできます。</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="btnToggle">Pause</button>
    <button class="btn" id="btnQuality">Quality: High</button>
    <span class="hint">ドラッグで少しだけ視点移動</span>
  </div>

  <div class="vignette"></div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // -----------------------------
    // Aquarium Base (Style A)
    // - Calm, transparent, clean
    // - Minimal post FX, light fog, caustics-ish light on the floor
    // - Bubble + micro particle systems
    // -----------------------------

    const root = document.getElementById('app');
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    root.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    // Background gradient (shader on big sphere)
    const bgGeo = new THREE.SphereGeometry(50, 32, 32);
    const bgMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: {
        uTop: { value: new THREE.Color('#bfefff') },
        uMid: { value: new THREE.Color('#3aa7d8') },
        uBot: { value: new THREE.Color('#0b2a3a') },
        uTime: { value: 0 },
      },
      vertexShader: `
        varying vec3 vPos;
        void main(){
          vPos = position;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec3 vPos;
        uniform vec3 uTop;
        uniform vec3 uMid;
        uniform vec3 uBot;
        uniform float uTime;
        float smoothstep01(float x){ return smoothstep(0.0, 1.0, x); }
        void main(){
          float h = normalize(vPos).y * 0.5 + 0.5;
          // gentle shimmering
          float shimmer = 0.03 * sin(uTime * 0.35 + h * 8.0);
          vec3 col1 = mix(uBot, uMid, smoothstep01(h * 1.2));
          vec3 col2 = mix(uMid, uTop, smoothstep01((h - 0.3) * 1.6));
          vec3 col = mix(col1, col2, smoothstep01(h));
          col += shimmer;
          gl_FragColor = vec4(col, 1.0);
        }
      `
    });
    const bg = new THREE.Mesh(bgGeo, bgMat);
    scene.add(bg);

    scene.fog = new THREE.FogExp2(new THREE.Color('#1a6d8b'), 0.035);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.05, 200);
    camera.position.set(0.0, 0.8, 6.2);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 3.2;
    controls.maxDistance = 8.0;
    controls.maxPolarAngle = Math.PI * 0.62;
    controls.minPolarAngle = Math.PI * 0.24;
    controls.target.set(0, 0.25, 0);

    // Lights
    const hemi = new THREE.HemisphereLight(new THREE.Color('#c9f6ff'), new THREE.Color('#0a1a22'), 0.85);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(new THREE.Color('#e7fbff'), 1.25);
    dir.position.set(2.5, 5.5, 2.0);
    scene.add(dir);

    const fill = new THREE.PointLight(new THREE.Color('#6fd7ff'), 0.7, 20);
    fill.position.set(-2.4, 1.3, -1.2);
    scene.add(fill);

    // Aquarium glass box (walls)
    const tankW = 6.6, tankH = 4.2, tankD = 4.8;
    const wallThickness = 0.05;

    const glassMat = new THREE.MeshPhysicalMaterial({
      color: new THREE.Color('#dff7ff'),
      transmission: 1.0,
      transparent: true,
      opacity: 1.0,
      roughness: 0.05,
      metalness: 0.0,
      ior: 1.33,
      thickness: 0.6,
      specularIntensity: 0.6,
      clearcoat: 0.4,
      clearcoatRoughness: 0.1,
    });

    // Build tank walls as thin boxes (easier to keep inside empty)
    function wall(x, y, z, sx, sy, sz){
      const g = new THREE.BoxGeometry(sx, sy, sz);
      const m = new THREE.Mesh(g, glassMat);
      m.position.set(x, y, z);
      return m;
    }

    const tank = new THREE.Group();
    tank.position.set(0, 0.0, 0);
    // Left / Right
    tank.add(wall(-tankW/2, 0, 0, wallThickness, tankH, tankD));
    tank.add(wall( tankW/2, 0, 0, wallThickness, tankH, tankD));
    // Back
    tank.add(wall(0, 0, -tankD/2, tankW, tankH, wallThickness));
    // Front (slightly more transparent by reducing roughness via clone)
    const frontMat = glassMat.clone();
    frontMat.roughness = 0.03;
    const front = new THREE.Mesh(new THREE.BoxGeometry(tankW, tankH, wallThickness), frontMat);
    front.position.set(0, 0, tankD/2);
    tank.add(front);
    // Bottom glass lip
    tank.add(wall(0, -tankH/2, 0, tankW, wallThickness, tankD));
    scene.add(tank);

    // Floor (rock base)
    const floorGeo = new THREE.CylinderGeometry(2.4, 2.9, 0.45, 48, 1);
    const floorMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color('#17313f'),
      roughness: 0.95,
      metalness: 0.0,
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.set(0, -tankH/2 + 0.25, 0);
    tank.add(floor);

    // Some rocks (simple blobs)
    function makeRock(seed=0){
      const geo = new THREE.IcosahedronGeometry(0.45 + Math.random()*0.25, 2);
      const pos = geo.attributes.position;
      for (let i=0; i<pos.count; i++){
        const x = pos.getX(i), y = pos.getY(i), z = pos.getZ(i);
        const n = (Math.sin(x*4.0 + seed) + Math.cos(y*5.0 + seed*1.7) + Math.sin(z*3.0 - seed))*0.03;
        pos.setXYZ(i, x*(1.0+n), y*(1.0+n), z*(1.0+n));
      }
      geo.computeVertexNormals();
      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color('#122a36'),
        roughness: 0.98,
        metalness: 0.0,
      });
      const m = new THREE.Mesh(geo, mat);
      m.castShadow = false;
      m.receiveShadow = false;
      return m;
    }
    const rockGroup = new THREE.Group();
    rockGroup.position.set(0, -tankH/2 + 0.70, 0);
    for (let i=0; i<6; i++){
      const r = makeRock(i);
      r.position.set((Math.random()-0.5)*1.9, (Math.random()-0.5)*0.15, (Math.random()-0.5)*1.6);
      r.scale.setScalar(0.9 + Math.random()*0.8);
      rockGroup.add(r);
    }
    tank.add(rockGroup);

    // Caustics-ish light plane (cheap animated shader)
    const causticGeo = new THREE.CircleGeometry(2.7, 64);
    const causticMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms: {
        uTime: { value: 0 },
        uColor: { value: new THREE.Color('#bff2ff') },
        uIntensity: { value: 0.65 },
      },
      vertexShader: `
        varying vec2 vUv;
        void main(){
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform float uTime;
        uniform vec3 uColor;
        uniform float uIntensity;

        float waves(vec2 p){
          float a = 0.0;
          a += sin((p.x + uTime*0.18) * 18.0) * 0.5;
          a += sin((p.y - uTime*0.15) * 16.0) * 0.5;
          a += sin((p.x + p.y + uTime*0.12) * 14.0) * 0.5;
          return a;
        }

        void main(){
          vec2 p = (vUv - 0.5) * 2.0;
          float r = length(p);
          float m = waves(p);
          float ca = smoothstep(0.25, 1.0, abs(m));
          float falloff = smoothstep(1.1, 0.25, r);
          float alpha = ca * falloff * 0.35 * uIntensity;
          gl_FragColor = vec4(uColor, alpha);
        }
      `
    });
    const caustic = new THREE.Mesh(causticGeo, causticMat);
    caustic.rotation.x = -Math.PI/2;
    caustic.position.set(0, -tankH/2 + 0.52, 0);
    tank.add(caustic);

    // Water surface (subtle)
    const surfaceGeo = new THREE.PlaneGeometry(tankW*0.86, tankD*0.86, 1, 1);
    const surfaceMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      uniforms: {
        uTime: { value: 0 },
        uTint: { value: new THREE.Color('#bfefff') },
      },
      vertexShader: `
        varying vec2 vUv;
        void main(){
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform float uTime;
        uniform vec3 uTint;
        void main(){
          float w = sin((vUv.x + uTime*0.06) * 25.0) * 0.04 + sin((vUv.y - uTime*0.05) * 21.0) * 0.04;
          float rim = smoothstep(0.2, 0.95, abs(vUv.x-0.5)*2.0) + smoothstep(0.2, 0.95, abs(vUv.y-0.5)*2.0);
          float a = 0.08 + w;
          a *= (1.0 - rim*0.35);
          gl_FragColor = vec4(uTint, a);
        }
      `
    });
    const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
    surface.rotation.x = -Math.PI/2;
    surface.position.set(0, tankH/2 - 0.22, 0);
    tank.add(surface);

    // Particle textures (procedural)
    function makeCircleTexture({ size=64, soft=true } = {}){
      const c = document.createElement('canvas');
      c.width = c.height = size;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      if (soft){
        g.addColorStop(0.0, 'rgba(255,255,255,0.85)');
        g.addColorStop(0.35, 'rgba(255,255,255,0.30)');
        g.addColorStop(1.0, 'rgba(255,255,255,0.0)');
      } else {
        g.addColorStop(0.0, 'rgba(255,255,255,0.9)');
        g.addColorStop(1.0, 'rgba(255,255,255,0.0)');
      }
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
      ctx.fill();
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    const bubbleTex = makeCircleTexture({ size: 96, soft: true });
    const dustTex = makeCircleTexture({ size: 64, soft: true });

    // Micro dust particles
    const dustCount = 800;
    const dustGeo = new THREE.BufferGeometry();
    const dustPos = new Float32Array(dustCount * 3);
    const dustVel = new Float32Array(dustCount);
    for (let i=0; i<dustCount; i++){
      const x = (Math.random()-0.5) * (tankW*0.78);
      const y = (Math.random()-0.5) * (tankH*0.82);
      const z = (Math.random()-0.5) * (tankD*0.72);
      dustPos[i*3+0] = x;
      dustPos[i*3+1] = y;
      dustPos[i*3+2] = z;
      dustVel[i] = 0.015 + Math.random()*0.035;
    }
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
    const dustMat = new THREE.PointsMaterial({
      map: dustTex,
      transparent: true,
      depthWrite: false,
      size: 0.05,
      opacity: 0.25,
      color: new THREE.Color('#d7f7ff'),
      blending: THREE.AdditiveBlending,
    });
    const dust = new THREE.Points(dustGeo, dustMat);
    dust.position.set(0, 0.0, 0);
    scene.add(dust);

    // Bubble particles (rise)
    const bubbleCount = 160;
    const bubbleGeo = new THREE.BufferGeometry();
    const bubblePos = new Float32Array(bubbleCount * 3);
    const bubbleSeed = new Float32Array(bubbleCount);
    const bubbleSpeed = new Float32Array(bubbleCount);

    function respawnBubble(i, y = -tankH/2){
      const x = (Math.random()-0.5) * (tankW*0.7);
      const z = (Math.random()-0.5) * (tankD*0.62);
      bubblePos[i*3+0] = x;
      bubblePos[i*3+1] = y;
      bubblePos[i*3+2] = z;
      bubbleSeed[i] = Math.random()*Math.PI*2;
      bubbleSpeed[i] = 0.18 + Math.random()*0.35;
    }
    for (let i=0; i<bubbleCount; i++) respawnBubble(i, -tankH/2 + Math.random()*tankH);

    bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePos, 3));
    const bubbleMat = new THREE.PointsMaterial({
      map: bubbleTex,
      transparent: true,
      depthWrite: false,
      size: 0.12,
      opacity: 0.40,
      color: new THREE.Color('#e9fbff'),
      blending: THREE.AdditiveBlending,
    });
    const bubbles = new THREE.Points(bubbleGeo, bubbleMat);
    bubbles.position.set(0, 0.0, 0);
    scene.add(bubbles);

    // A tiny jellyfish placeholder (super simple)
    const jelly = new THREE.Group();
    jelly.position.set(1.15, 1.5, -0.6);
    const bell = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 24, 18, 0, Math.PI*2, 0, Math.PI*0.72),
      new THREE.MeshPhysicalMaterial({
        color: new THREE.Color('#dff7ff'),
        transmission: 1,
        roughness: 0.08,
        thickness: 0.35,
        ior: 1.25,
        transparent: true,
        opacity: 1,
      })
    );
    bell.scale.set(1.25, 1.0, 1.25);
    jelly.add(bell);

    const tentMat = new THREE.MeshStandardMaterial({ color: new THREE.Color('#bfefff'), roughness: 0.7, metalness: 0.0, transparent: true, opacity: 0.55 });
    for (let i=0; i<8; i++){
      const tg = new THREE.CylinderGeometry(0.01, 0.007, 0.5 + Math.random()*0.25, 8, 1);
      const t = new THREE.Mesh(tg, tentMat);
      const a = (i/8) * Math.PI*2;
      t.position.set(Math.cos(a)*0.11, -0.32, Math.sin(a)*0.11);
      t.rotation.z = (Math.random()-0.5)*0.35;
      t.rotation.x = (Math.random()-0.5)*0.35;
      jelly.add(t);
    }
    tank.add(jelly);

    // UI
    const clockEl = document.getElementById('clock');
    const btnToggle = document.getElementById('btnToggle');
    const btnQuality = document.getElementById('btnQuality');

    let paused = false;
    let highQuality = true;

    btnToggle.addEventListener('click', () => {
      paused = !paused;
      btnToggle.textContent = paused ? 'Resume' : 'Pause';
    });

    btnQuality.addEventListener('click', () => {
      highQuality = !highQuality;
      btnQuality.textContent = highQuality ? 'Quality: High' : 'Quality: Low';
      // Low: drop DPR + disable AA-ish look by reducing pixel ratio
      renderer.setPixelRatio(highQuality ? Math.min(window.devicePixelRatio, 2) : 1);
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateClock(){
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      const ss = String(d.getSeconds()).padStart(2,'0');
      clockEl.textContent = `${hh}:${mm}:${ss}`;
    }
    setInterval(updateClock, 250);
    updateClock();

    // Animation
    const t0 = performance.now();
    function tick(){
      requestAnimationFrame(tick);
      if (paused) return;

      const t = (performance.now() - t0) * 0.001;

      bgMat.uniforms.uTime.value = t;
      causticMat.uniforms.uTime.value = t;
      surfaceMat.uniforms.uTime.value = t;

      // gentle "live cam" sway (scene-level so OrbitControls stays stable)
      tank.rotation.y = Math.sin(t * 0.18) * 0.02;
      tank.rotation.x = Math.sin(t * 0.15) * 0.01;

      // dust drift
      const p = dustGeo.attributes.position;
      for (let i=0; i<dustCount; i++){
        const y = p.getY(i) + dustVel[i] * 0.006;
        p.setY(i, y > tankH/2 ? -tankH/2 : y);
      }
      p.needsUpdate = true;

      // bubbles rise + wobble
      const bp = bubbleGeo.attributes.position;
      for (let i=0; i<bubbleCount; i++){
        let x = bp.getX(i);
        let y = bp.getY(i);
        let z = bp.getZ(i);
        y += bubbleSpeed[i] * 0.012;
        x += Math.sin(t*0.9 + bubbleSeed[i]) * 0.0018;
        z += Math.cos(t*0.85 + bubbleSeed[i]) * 0.0018;
        if (y > tankH/2 - 0.25) respawnBubble(i, -tankH/2);
        else {
          bp.setXYZ(i, x, y, z);
        }
      }
      bp.needsUpdate = true;

      // jellyfish idle
      jelly.position.y = 1.45 + Math.sin(t*0.8) * 0.07;
      jelly.rotation.y = Math.sin(t*0.35) * 0.25;

      controls.update();
      renderer.render(scene, camera);
    }
    tick();

    // Resize
    function onResize(){
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', onResize);

    // --- TODO / Next steps ---
    // 1) キャラ(glb)を読み込む: GLTFLoader で tank 内に追加
    // 2) ベイク影/ライト調整（Webは重いので基本ベイク推奨）
    // 3) 文字/ロゴをHUDに追加（KurageWorksロゴ）
    // 4) クリックでリアクション（泡増える/星が光る等）
  </script>
</body>
</html>
